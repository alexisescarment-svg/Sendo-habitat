<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <filter id="grain" x="0%" y="0%" width="100%" height="100%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" seed="8" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="grainBlend"/>
      <feComposite in="grainBlend" in2="SourceGraphic" operator="in"/>
    </filter>
    <filter id="roughen">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" seed="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="400" height="400" rx="22" ry="22"/>
    </clipPath>
    <!-- Worn texture pattern -->
    <pattern id="wornPattern" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="none"/>
      <circle cx="1" cy="1" r="0.6" fill="rgba(0,0,0,0.12)"/>
      <circle cx="3" cy="3" r="0.4" fill="rgba(0,0,0,0.08)"/>
      <circle cx="2" cy="1.5" r="0.3" fill="rgba(255,255,255,0.06)"/>
    </pattern>
  </defs>

  <!-- ── Outer rust frame ── -->
  <rect width="400" height="400" rx="22" ry="22" fill="#7B3A0E"/>

  <!-- Rust gradient effect - lighter patches -->
  <rect width="400" height="400" rx="22" ry="22" fill="url(#wornPattern)" opacity="0.4"/>

  <!-- Rust spots along edges -->
  <ellipse cx="60" cy="8" rx="25" ry="6" fill="#9C4E18" opacity="0.7"/>
  <ellipse cx="200" cy="5" rx="40" ry="5" fill="#8A4310" opacity="0.5"/>
  <ellipse cx="340" cy="8" rx="20" ry="6" fill="#B05A20" opacity="0.6"/>
  <ellipse cx="5" cy="180" rx="4" ry="30" fill="#9C4E18" opacity="0.5"/>
  <ellipse cx="395" cy="250" rx="4" ry="20" fill="#B05A20" opacity="0.5"/>
  <ellipse cx="150" cy="395" rx="30" ry="5" fill="#9C4E18" opacity="0.6"/>
  <ellipse cx="320" cy="397" rx="20" ry="4" fill="#A04A15" opacity="0.5"/>

  <!-- ── Inner blue background ── -->
  <rect x="16" y="16" width="368" height="368" rx="10" ry="10" fill="#1A5E8C"/>

  <!-- Worn blue texture -->
  <rect x="16" y="16" width="368" height="368" rx="10" ry="10" fill="url(#wornPattern)" opacity="0.6"/>

  <!-- Darker worn patches on blue -->
  <ellipse cx="80" cy="60" rx="35" ry="20" fill="rgba(0,20,60,0.25)" opacity="0.8"/>
  <ellipse cx="320" cy="100" rx="28" ry="18" fill="rgba(0,20,60,0.2)" opacity="0.7"/>
  <ellipse cx="150" cy="340" rx="40" ry="22" fill="rgba(0,20,60,0.18)" opacity="0.7"/>
  <ellipse cx="320" cy="320" rx="30" ry="25" fill="rgba(0,20,60,0.2)" opacity="0.6"/>

  <!-- Lighter worn spots -->
  <ellipse cx="280" cy="50" rx="18" ry="12" fill="rgba(80,140,200,0.15)" opacity="0.8"/>
  <ellipse cx="60" cy="310" rx="22" ry="14" fill="rgba(80,140,200,0.12)" opacity="0.7"/>

  <!-- ── Corner screws/rivets ── -->
  <!-- Top-left -->
  <circle cx="38" cy="38" r="12" fill="#6B3210" stroke="#C09060" stroke-width="1.5"/>
  <circle cx="38" cy="38" r="8" fill="#7A3A12"/>
  <line x1="30" y1="38" x2="46" y2="38" stroke="#3A1A06" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="30" x2="38" y2="46" stroke="#3A1A06" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="36" cy="36" r="2" fill="rgba(255,200,100,0.25)"/>

  <!-- Top-right -->
  <circle cx="362" cy="38" r="12" fill="#6B3210" stroke="#C09060" stroke-width="1.5"/>
  <circle cx="362" cy="38" r="8" fill="#7A3A12"/>
  <line x1="354" y1="38" x2="370" y2="38" stroke="#3A1A06" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="362" y1="30" x2="362" y2="46" stroke="#3A1A06" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="360" cy="36" r="2" fill="rgba(255,200,100,0.25)"/>

  <!-- Bottom-left -->
  <circle cx="38" cy="362" r="12" fill="#6B3210" stroke="#C09060" stroke-width="1.5"/>
  <circle cx="38" cy="362" r="8" fill="#7A3A12"/>
  <line x1="30" y1="362" x2="46" y2="362" stroke="#3A1A06" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="38" y1="354" x2="38" y2="370" stroke="#3A1A06" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="36" cy="360" r="2" fill="rgba(255,200,100,0.25)"/>

  <!-- Bottom-right -->
  <circle cx="362" cy="362" r="12" fill="#6B3210" stroke="#C09060" stroke-width="1.5"/>
  <circle cx="362" cy="362" r="8" fill="#7A3A12"/>
  <line x1="354" y1="362" x2="370" y2="362" stroke="#3A1A06" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="362" y1="354" x2="362" y2="370" stroke="#3A1A06" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="360" cy="360" r="2" fill="rgba(255,200,100,0.25)"/>

  <!-- ── CUBA text ── -->
  <!-- 3D shadow layer -->
  <text x="204" y="172" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Haettenschweiler', sans-serif"
        font-size="128" font-weight="900" letter-spacing="10"
        fill="#0A2E50" opacity="0.75">CUBA</text>
  <!-- Main text -->
  <text x="200" y="168" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Haettenschweiler', sans-serif"
        font-size="128" font-weight="900" letter-spacing="10"
        fill="#E8D498">CUBA</text>
  <!-- Worn overlay on CUBA -->
  <text x="200" y="168" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Haettenschweiler', sans-serif"
        font-size="128" font-weight="900" letter-spacing="10"
        fill="url(#wornPattern)" opacity="0.3">CUBA</text>

  <!-- ── Middle decorative band ── -->
  <!-- Left red line -->
  <rect x="38" y="200" width="116" height="7" rx="1" fill="#C23230"/>
  <!-- Right red line -->
  <rect x="246" y="200" width="116" height="7" rx="1" fill="#C23230"/>

  <!-- Inverted triangle (pointing down) -->
  <polygon points="200,244 164,196 236,196" fill="#C23230"/>

  <!-- Star in triangle -->
  <text x="200" y="232" text-anchor="middle"
        font-family="serif" font-size="24" fill="#F0EAD8">★</text>

  <!-- ── NAUTA text ── -->
  <!-- 3D shadow layer -->
  <text x="204" y="322" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Haettenschweiler', sans-serif"
        font-size="108" font-weight="900" letter-spacing="5"
        fill="#0A2E50" opacity="0.75">NAUTA</text>
  <!-- Main text -->
  <text x="200" y="318" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Haettenschweiler', sans-serif"
        font-size="108" font-weight="900" letter-spacing="5"
        fill="#E8D498">NAUTA</text>
  <!-- Worn overlay on NAUTA -->
  <text x="200" y="318" text-anchor="middle"
        font-family="Impact, 'Arial Black', 'Haettenschweiler', sans-serif"
        font-size="108" font-weight="900" letter-spacing="5"
        fill="url(#wornPattern)" opacity="0.3">NAUTA</text>

  <!-- ── Final grain/aging overlay on whole sign ── -->
  <rect x="16" y="16" width="368" height="368" rx="10" ry="10"
        fill="url(#wornPattern)" opacity="0.2"/>
</svg>
