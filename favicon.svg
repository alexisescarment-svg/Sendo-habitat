<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Blue background -->
  <rect width="32" height="32" rx="5" fill="#1A5E8C"/>
  <!-- Rust border -->
  <rect x="1.5" y="1.5" width="29" height="29" rx="4" fill="none" stroke="#8B4A15" stroke-width="1.5"/>
  <!-- Inner cream frame -->
  <rect x="3" y="3" width="26" height="26" rx="3" fill="none" stroke="#E8D498" stroke-width="0.8"/>
  <!-- Red inverted triangle (pointing down) -->
  <polygon points="16,23 7,11 25,11" fill="#C23230"/>
  <!-- White star -->
  <text x="16" y="20.5" text-anchor="middle" dominant-baseline="middle"
        font-family="serif" font-size="8" fill="#F0EAD8">★</text>
  <!-- Cream top line -->
  <rect x="4" y="10" width="3" height="2" rx="0.5" fill="#E8D498" opacity="0.8"/>
  <rect x="25" y="10" width="3" height="2" rx="0.5" fill="#E8D498" opacity="0.8"/>
</svg>
